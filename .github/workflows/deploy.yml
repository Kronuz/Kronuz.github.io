name: Deploy to GitHub Pages

# Public repo → GitHub-hosted runners are available, so we build Astro on
# ubuntu-latest and deploy to Pages. D2 diagrams are rendered at build time by
# shelling out to the `d2` CLI (see src/lib/renderD2.mjs), so we install it
# before building — the public runner has internet egress, unlike LinkedIn's.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install D2 (build-time diagram renderer)
        run: |
          curl -fsSL https://d2lang.com/install.sh | sh -s --
          d2 --version
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

#:schema node_modules/wrangler/config-schema.json
name = "discussions"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

# Local dev: `wrangler dev` binds this to a local (miniflare) SQLite file under
# .wrangler/. For a real deploy, `deploy.sh` (or `wrangler d1 create discussions`)
# fills in the database_id below.
[[d1_databases]]
binding = "DB"
database_name = "discussions"
database_id = "4e2b8a6d-1b8b-4172-aad9-5ea9b905eabe"
migrations_dir = "migrations"

# Blog-specific configuration lives in encrypted D1 tenant documents. These are the only
# non-secret, deployment-wide settings. SESSION_SECRET, CONFIG_MASTER_KEY, and
# SERVICE_ADMIN_TOKEN are Worker secrets.
[vars]
PUBLIC_BASE_URL = "https://discussions.kronuz.workers.dev"
REQUEST_MAX_BYTES = "1048576"
